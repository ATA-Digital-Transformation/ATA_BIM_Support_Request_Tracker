<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ATA · BIM Support Request Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#273745;--navy-deep:#1a2630;--navy-mid:#33414D;--navy-light:#3E5060;
  --navy-text:var(--navy);--navy-text-mid:var(--navy-mid);
  --grey-blue:#C3CDD4;--grey-light:#E3E7EA;--grey-hair:#D6DCE0;
  --paper:#F5F6F8;--white:#FFFFFF;--ink:#1B2630;--ink-mid:#4A5568;
  --red:#B83A3A;--red-light:#FFF0F0;--amber:#C77F1A;--amber-light:#FFF8EC;
  --green:#3E7A5C;--green-light:#EDF7F2;
  --f-display:'Montserrat',Arial,sans-serif;--f-body:'Inter',Arial,sans-serif;
  --f-mono:'JetBrains Mono','Courier New',monospace;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.15);--r:4px;
  --chip-h:24px;--chip-px:9px;--chip-fs:11px;--chip-icon:13px;
}
html{scroll-behavior:smooth;background:var(--paper);}
html.dark{--paper:#0f1923;}
body{font-family:var(--f-body);background:var(--paper);color:var(--ink);font-size:13.5px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}

/* ── DARK MODE ── */
body.dark{--paper:#0f1923;--white:#1a2630;--ink:#e8ecf0;--ink-mid:#8fa0b0;--grey-hair:#2a3a4a;--grey-light:#1e2e3e;--navy-deep:#0a1420;--navy:#1a2a3a;--navy-mid:#2a3a4a;--red-light:#2a1010;--amber-light:#2a1e08;--green-light:#0e1e16;--navy-text:#8fc4ff;--navy-text-mid:#7ea8d8;}
body.dark .chip-overdue{background:#3a1414;color:#ff8a8a;}
body.dark table,body.dark .toolbar,body.dark .modal,body.dark .drawer{background:var(--white);color:var(--ink);}
body.dark .form-group input,body.dark .form-group select,body.dark .form-group textarea,body.dark .drawer-field input,body.dark .drawer-field select,body.dark .drawer-field textarea,body.dark select.filter,body.dark .search-wrap input,body.dark .manage-add-row input,body.dark .manage-add-row select{background:var(--paper);color:var(--ink);border-color:var(--grey-hair);}
body.dark .modal-footer,body.dark .drawer-footer,body.dark .manage-panel-body{background:var(--paper);}
body.dark tbody tr:hover{background:#1e2e3e;}
body.dark .col-hl{background:#1e2a10!important;}
body.dark thead th.col-hl{background:#2a1e00!important;}
body.dark .settings-group{background:var(--paper);border-color:var(--grey-hair);}
body.dark .card-stat{background:var(--white);}
body.dark .dash-section{background:var(--white);}
body.dark .manage-row{background:var(--paper);}
body.dark .col-toggle-panel{background:var(--white);}
body.dark .request-card{background:var(--white);}

/* ── LOGIN ── */
.login-screen{display:none;position:fixed;inset:0;z-index:9999;background:var(--navy-deep);flex-direction:column;align-items:center;justify-content:center;gap:24px;}
.login-screen.show{display:flex;}
.login-logo{height:60px;margin-bottom:8px;}
.login-title{font-family:var(--f-display);font-size:22px;font-weight:800;color:#fff;text-transform:uppercase;}
.login-title span{color:var(--grey-blue);font-weight:300;}
.login-sub{font-family:var(--f-mono);font-size:11px;color:rgba(195,205,212,.45);letter-spacing:.5px;text-transform:uppercase;}
.login-card{background:rgba(255,255,255,.04);border:1px solid rgba(195,205,212,.1);border-radius:var(--r);padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;min-width:320px;}
.login-card p{font-size:13px;color:rgba(195,205,212,.6);text-align:center;line-height:1.6;}
.login-top-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red) 0%,var(--grey-blue) 40%,transparent 100%);}

/* ── NAV ── */
#nav{position:sticky;top:0;z-index:100;background:var(--navy-deep);border-bottom:2px solid rgba(195,205,212,.12);display:flex;align-items:center;padding:0 40px;height:56px;box-shadow:0 2px 20px rgba(0,0,0,.35);}
.nav-logo{height:28px;display:block;animation:logoFloat 3.2s ease-in-out infinite;transition:transform .25s ease,filter .25s ease;}
.nav-logo:hover{transform:scale(1.08) rotate(-2deg);filter:brightness(1.1);}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.02);}}
.nav-divider{width:1px;height:28px;background:rgba(195,205,212,.2);margin:0 16px;}
.nav-title{color:rgba(255,255,255,.92);font-family:var(--f-display);font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.nav-title span{color:var(--grey-blue);font-weight:400;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-pill.sync{font-family:var(--f-mono);font-size:10px;background:rgba(195,205,212,.08);color:rgba(195,205,212,.7);padding:4px 12px;border-radius:2px;display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s ease infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.nav-btn{font-family:var(--f-display);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);border:1px solid rgba(195,205,212,.2);padding:6px 12px;border-radius:2px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.nav-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.nav-user{display:flex;align-items:center;gap:8px;padding:4px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(195,205,212,.15);border-radius:2px;cursor:pointer;position:relative;}
.nav-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(195,205,212,.3);}
.nav-avatar-placeholder{width:26px;height:26px;border-radius:50%;background:var(--navy-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--grey-blue);}
.nav-user-name{font-family:var(--f-mono);font-size:10px;color:rgba(255,255,255,.75);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── PROFILE DROPDOWN ── */
.profile-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1.5px solid var(--grey-hair);border-radius:var(--r);box-shadow:var(--shadow-lg);min-width:260px;z-index:110;overflow:hidden;}
.profile-dropdown.open{display:block;}
.profile-header{padding:14px 16px;background:var(--navy-deep);color:#fff;}
.profile-header-name{font-family:var(--f-display);font-size:13px;font-weight:700;}
.profile-header-email{font-family:var(--f-mono);font-size:10px;color:rgba(195,205,212,.6);margin-top:2px;}
.profile-section{padding:12px 16px;border-bottom:1px solid var(--grey-hair);}
.profile-section-title{font-family:var(--f-display);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-mid);margin-bottom:8px;}
.profile-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0;}
.profile-label{font-size:12px;color:var(--ink);}
.profile-control select,.profile-control input[type="checkbox"]{font-size:12px;font-family:var(--f-body);}
.profile-control select{padding:3px 6px;border:1px solid var(--grey-hair);border-radius:2px;background:var(--paper);color:var(--ink);outline:none;}
.profile-control input[type="checkbox"]{accent-color:var(--navy-text);}
.profile-actions{padding:10px 16px;display:flex;gap:8px;}

/* ── TAB BAR ── */
.tab-bar{background:var(--white);border-bottom:2px solid var(--grey-hair);display:flex;padding:0 40px;position:sticky;top:56px;z-index:90;}
/* Toolbar sticky below nav + tab bar (56+44=100px) */
.toolbar{background:var(--white);border-bottom:1px solid var(--grey-hair);padding:10px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:100px;z-index:80;}
/* thead sticky to top of its own scroll container (.table-wrap), not the page.
   Scoped to .table-wrap ONLY — page-scrolling tables (.gantt-table and its
   variants: My-To-Do Sheet/Gantt/Table views, Workload table, etc.) manage
   their own sticky offset in JS (see stickyHeaderTopOffset()), so if this
   rule were global it would double-stick those headers: the <thead> itself
   sticks at top:0 from this CSS AND its cells stick again at the JS-computed
   offset, producing the overlapping/duplicated header rows. */
thead{background:var(--navy-deep);color:var(--white);}
.table-wrap thead{position:sticky;top:0;z-index:50;}
.tab-item{padding:12px 20px;font-family:var(--f-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:color .15s;}
.tab-item:hover{color:var(--navy-text);}
.tab-item.active{color:var(--navy-text);border-bottom-color:var(--navy-text);}
.tab-item.manager-tab{display:none;}
.tab-item.manager-tab.unlocked{display:flex;}

/* ── TAB PANELS ── */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── HERO ── */
.hero{background:var(--navy-deep);position:relative;overflow:hidden;padding:40px 56px 32px;}
.hero-top-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red) 0%,var(--grey-blue) 40%,transparent 100%);}
.hero-logo{height:48px;display:block;margin-bottom:18px;}
.hero-title{font-family:var(--f-display);font-size:28px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.5px;text-transform:uppercase;margin-bottom:20px;}
.hero-title span{color:var(--grey-blue);font-weight:300;}
.hero-kpi-strip{display:flex;gap:2px;flex-wrap:wrap;}
.hero-kpi{background:rgba(255,255,255,.04);border:1px solid rgba(195,205,212,.1);border-radius:var(--r);padding:14px 20px;flex:1;min-width:120px;}
.hero-kpi-label{font-family:var(--f-mono);font-size:10px;font-weight:700;color:rgba(195,205,212,.5);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.hero-kpi-val{font-family:var(--f-display);font-size:26px;font-weight:800;color:#fff;line-height:1;}
.hero-kpi-sub{font-family:var(--f-mono);font-size:10px;color:rgba(195,205,212,.4);margin-top:3px;}
.hero-kpi.kpi-red .hero-kpi-val{color:var(--red);}
.hero-kpi.kpi-amb .hero-kpi-val{color:var(--amber);}
.hero-kpi.kpi-grn .hero-kpi-val{color:#6EC49A;}
.hero-kpi.kpi-grey .hero-kpi-val{color:var(--grey-blue);}

/* ── TOOLBAR ── */
/* toolbar defined above with sticky */
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-mid);pointer-events:none;}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:13px;font-family:var(--f-body);background:var(--paper);color:var(--ink);outline:none;}
.search-wrap input:focus{border-color:var(--navy-text-mid);}
select.filter{padding:6px 8px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:12px;font-family:var(--f-body);background:var(--paper);color:var(--ink);cursor:pointer;outline:none;}
.toolbar-sep{width:1px;height:24px;background:var(--grey-hair);flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;font-family:var(--f-body);cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy);color:var(--white);}
.btn-primary:hover{background:var(--navy-mid);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-ghost{background:transparent;color:var(--navy-text);border:1.5px solid var(--grey-hair);}
.btn-ghost:hover{background:var(--paper);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-active{background:var(--navy)!important;color:var(--white)!important;border-color:var(--navy-text)!important;}
.kbd{display:inline-block;background:rgba(195,205,212,.12);color:var(--grey-blue);border:1px solid rgba(195,205,212,.2);border-radius:2px;padding:0 5px;font-family:var(--f-mono);font-size:9px;}

/* ── BULK BAR ── */
.bulk-bar{display:none;background:var(--navy);color:var(--white);padding:10px 40px;align-items:center;gap:12px;font-size:13px;}
.bulk-bar.show{display:flex;}
.bulk-bar select{padding:5px 8px;border-radius:var(--r);border:none;font-size:12px;background:rgba(255,255,255,.15);color:#fff;}

/* ── COL TOGGLE ── */
.col-toggle-wrap{position:relative;}
.col-toggle-panel{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1.5px solid var(--grey-hair);border-radius:var(--r);box-shadow:var(--shadow-md);padding:12px 16px;min-width:200px;z-index:110;}
.col-toggle-panel.open{display:block;}
.col-toggle-panel h4{font-family:var(--f-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);margin-bottom:10px;}
.col-toggle-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;cursor:pointer;}
.col-toggle-item input{cursor:pointer;accent-color:var(--navy-text);}

/* ── TABLE ── */
.table-wrap{padding:18px 40px 0;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 146px);}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);font-size:13px;}
/* thead defined above with corrected sticky top */
thead th{padding:11px 12px;text-align:left;font-family:var(--f-display);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{background:var(--navy-mid);}
thead th.col-hl{background:#4A3A12!important;color:#F0DFAE;}
thead th .sort-icon{opacity:.4;margin-left:4px;font-size:10px;}
tbody tr{border-bottom:1px solid var(--grey-light);transition:background .1s;border-left:3px solid transparent;}
tbody tr.compact td{padding:4px 12px;}
tbody tr.pri-critical{border-left-color:var(--red);}
tbody tr.pri-high{border-left-color:var(--amber);}
tbody tr.pri-medium{border-left-color:var(--green);}
tbody tr.pri-low{border-left-color:var(--grey-hair);}
tbody tr.overdue-row{background:#FFF8F8!important;}
tbody tr:hover{background:var(--paper);}
tbody td{padding:8px 12px;vertical-align:middle;}
.col-hl{background:#FBF6E9!important;}
tbody tr:hover td.col-hl{background:#F5EDD6!important;}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:5px;height:var(--chip-h);padding:0 var(--chip-px);border-radius:3px;font-size:var(--chip-fs);font-weight:600;white-space:nowrap;border:1px solid transparent;font-family:var(--f-body);line-height:1;vertical-align:middle;}
.chip svg{width:var(--chip-icon);height:var(--chip-icon);flex-shrink:0;}
.chip-project{background:var(--paper);color:var(--navy-text-mid);border-color:var(--grey-hair);}
.chip-critical{background:var(--red-light);color:var(--red);border-color:rgba(184,58,58,.2);}
.chip-high{background:var(--amber-light);color:var(--amber);border-color:rgba(199,127,26,.2);}
.chip-medium{background:var(--green-light);color:var(--green);border-color:rgba(62,122,92,.2);}
.chip-low{background:var(--paper);color:var(--ink-mid);border-color:var(--grey-hair);}

/* ══ TEAM TRACKER / MY-TO-DO (GANTT) ══════════════════════ */
.tab-item.assignee-tab{display:none;}
.tab-item.assignee-tab.unlocked{display:flex;}
.tab-item.self-tab{display:none;}
.tab-item.self-tab.unlocked{display:flex;}

/* ══ Redesigned My-To-Do toolbar card (view switcher + filters + legend + date range) ══ */
.tt-toolbar-card{background:var(--white);border:1px solid var(--grey-hair);border-radius:12px;box-shadow:var(--shadow-sm);margin-bottom:16px;overflow:hidden;}
.tt-toolbar-section{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tt-toolbar-section+.tt-toolbar-section{border-top:1px solid var(--grey-light);}
.view-switch-bar{display:flex;gap:4px;}
.view-switch-btn{padding:7px 16px;border:none;background:transparent;color:var(--ink-mid);border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--f-body);display:inline-flex;align-items:center;gap:6px;transition:background .12s,color .12s;}
.view-switch-btn:hover{background:var(--paper);}
.view-switch-btn.active{background:var(--navy-deep);color:#fff;}
.tt-filter-pill{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1.5px solid var(--grey-hair);border-radius:20px;padding:0 6px 0 12px;}
.tt-filter-pill .tt-filter-icon{font-size:12px;opacity:.75;}
.tt-filter-pill select,.tt-filter-pill input[type=text]{border:none;background:transparent;font-size:12px;color:var(--ink);font-family:var(--f-body);padding:7px 6px;cursor:pointer;}
.tt-filter-pill input[type=text]{cursor:text;min-width:140px;}
.tt-filter-pill select:focus,.tt-filter-pill input:focus{outline:none;}
.tt-filter-clear{background:none;border:none;color:var(--red);font-size:11.5px;font-weight:700;cursor:pointer;padding:6px 4px;}
.gantt-legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.gantt-legend-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-mid);background:var(--paper);border-radius:20px;padding:4px 10px 4px 8px;font-weight:600;}
.gantt-legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
.gantt-legend-divider{width:1px;height:16px;background:var(--grey-hair);margin:0 2px;}
.tt-daterange-row{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;padding:12px 16px;overflow-x:auto;}
.tt-daterange-row label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-mid);font-weight:600;flex-shrink:0;}
.tt-daterange-icon{font-size:13px;}
.gantt-cat-title{font-family:var(--f-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy-text);background:var(--paper);padding:8px 12px;border-left:4px solid var(--navy-text);margin:18px 0 8px;}
.gantt-cat-title:first-child{margin-top:0;}
.gantt-cat-empty{font-size:12px;color:var(--ink-mid);font-style:italic;padding:4px 12px 14px;}
.gantt-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-sm);font-size:12.5px;margin-bottom:6px;}
.gantt-table th,.gantt-table td{border-right:1px solid var(--grey-light);border-bottom:1px solid var(--grey-light);}
.gantt-table th{border-color:rgba(255,255,255,.12);}
.gantt-flat{table-layout:fixed;width:auto;min-width:100%;}
.gantt-table th{background:var(--navy-deep);color:#fff;padding:0 10px;text-align:left;font-family:var(--f-display);font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
/* Fixed, constant header row heights — every header row (spacer, labels,
   month, day-number) is EXACTLY the same height across every table and
   every view. This is what actually guarantees left/right pane alignment:
   no runtime measurement, so there's nothing that can be measured too early,
   go stale, or drift between two independently-rendered tables. */
.gantt-table thead tr:first-child th{height:30px;vertical-align:middle;}
.gantt-table thead tr:last-child th{height:26px;vertical-align:middle;}
.gantt-table thead tr:only-child th{height:30px;}
/* The split left-pane table (Category…Status) has only ONE real header row —
   no blank spacer row above it. To stay visually aligned with the right
   pane's two stacked rows (month + day, 30px + 26px), this single row is
   given their combined height instead. Placed after the generic rule above
   so it wins the (equal-specificity) cascade for this table specifically. */
.gantt-split-left-table thead tr:only-child th{height:56px;vertical-align:middle;}
.gantt-table td{padding:7px 10px;border-bottom:1px solid var(--grey-light);vertical-align:middle;}
.gantt-table tr.gantt-overdue td{background:#FF0000!important;color:#fff!important;}
.gantt-table tr.gantt-overdue .gantt-bar-track{background:rgba(255,255,255,.35);}
.gantt-status-chip{display:inline-block;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:700;white-space:nowrap;}
.gs-todo{background:#FFF2CC;color:#7F6000;}
.gs-inprogress{background:#BDD7EE;color:#1F497D;}
.gs-done{background:#C6EFCE;color:#276221;}
.gs-onhold{background:#FCE4D6;color:#833C00;}
.gantt-bar-cell{width:180px;min-width:150px;}
.gantt-bar-track{position:relative;height:18px;background:var(--paper);border-radius:3px;border:1px solid var(--grey-hair);overflow:hidden;}
.gantt-bar{position:absolute;top:1px;bottom:1px;border-radius:2px;}
.gantt-today-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:#E03C31;z-index:2;}
.gantt-source-tag{font-size:9px;color:var(--ink-mid);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.gantt-toolbar{display:flex;gap:8px;align-items:center;padding:16px 0 4px;flex-wrap:wrap;}
.gantt-add-row{display:none;grid-template-columns:1fr 1fr 1.4fr 1fr 1fr 1fr auto auto;gap:8px;padding:12px;background:var(--paper);border-radius:var(--r);margin:10px 0;align-items:center;}
.gantt-cat-cell{font-weight:700;font-size:11px;color:var(--navy-text-mid);white-space:nowrap;}
.gantt-group-row{cursor:pointer;background:var(--paper);}
.gantt-group-row:hover{background:var(--grey-light);}
.gantt-group-row.gantt-proj-group .gantt-cat-cell{color:var(--ink-mid);}
.gantt-group-toggle{font-size:10px;width:12px;display:inline-block;}
.gantt-flat .editable-cell{cursor:pointer;}
.gantt-flat .editable-cell:hover{background:var(--paper);}
.gantt-flat .editable-cell input,.gantt-flat .editable-cell select{width:100%;padding:3px 5px;font-size:12px;border:1.5px solid var(--navy-text-mid);border-radius:3px;}
.gantt-add-row.open{display:grid;}
.gantt-add-row input,.gantt-add-row select{padding:6px 8px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:12px;background:var(--white);color:var(--ink);}
.gantt-empty-note{text-align:center;padding:30px;color:var(--ink-mid);font-size:13px;}

/* ══ Custom dd/mm/yyyy date field + popup calendar ══════════ */
.dmy-date-wrap{display:inline-block;}
.dmy-date-display{padding:5px 8px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:12px;font-family:var(--f-body);background:var(--white);color:var(--ink);cursor:pointer;width:100px;}
.dmy-date-display::placeholder{color:var(--ink-mid);}
.editable-cell-date-input{border:none;background:transparent;font:inherit;color:inherit;cursor:pointer;width:100%;padding:0;}
.dmy-datepicker-popup{position:fixed;z-index:9999;background:var(--white);border:1px solid var(--grey-hair);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.18);padding:10px;width:220px;font-family:var(--f-body);}
.dmy-dp-header{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--navy-text);margin-bottom:6px;}
.dmy-dp-header button{background:none;border:none;font-size:16px;cursor:pointer;color:var(--navy-text);padding:2px 8px;border-radius:4px;}
.dmy-dp-header button:hover{background:var(--paper);}
.dmy-dp-dow{display:grid;grid-template-columns:repeat(7,1fr);font-size:10px;color:var(--ink-mid);text-align:center;margin-bottom:2px;}
.dmy-dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dmy-dp-cell{text-align:center;font-size:11.5px;padding:5px 0;border-radius:4px;cursor:pointer;color:var(--ink);}
.dmy-dp-cell:not(.dmy-dp-empty):hover{background:var(--paper);}
.dmy-dp-cell.dmy-dp-weekend{color:var(--ink-mid);}
.dmy-dp-cell.dmy-dp-today{font-weight:700;box-shadow:inset 0 0 0 1px var(--navy-text);}
.dmy-dp-cell.dmy-dp-selected{background:var(--navy-deep);color:#fff;font-weight:700;}
.dmy-dp-footer{display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid var(--grey-light);}
.dmy-dp-footer button{background:none;border:none;font-size:11px;color:var(--navy-text);cursor:pointer;font-weight:600;}
.dmy-dp-footer button:hover{text-decoration:underline;}

/* Merged Category/Project group cells (rowspan) */
.gantt-merge-cell{vertical-align:middle;cursor:pointer;white-space:nowrap;}
.gantt-merge-cell:hover{background:var(--grey-light)!important;}

/* Frozen leading columns (Category…Status), like Google Sheets frozen columns */
.gantt-frozen-col{z-index:3;box-shadow:2px 0 4px -2px rgba(0,0,0,.12);}
.gantt-table thead .gantt-frozen-col{z-index:5;}
.gantt-table tr.gantt-overdue .gantt-frozen-col{background:#FDECEA;}
.gantt-table tr.gantt-group-row .gantt-frozen-col{background:var(--paper);}
.gantt-table tbody tr:not(.gantt-overdue):not(.gantt-group-row) .gantt-frozen-col{background:var(--white);}
.gantt-table thead .gantt-frozen-col{background:var(--navy-deep);color:#fff;}

/* Column resize handle — hover the right edge of a frozen header cell to drag */
.gantt-col-resizer{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:6;}
.gantt-col-resizer:hover,.gantt-col-resizer:active{background:rgba(255,255,255,.25);}
.gantt-table th{position:relative;}

.gantt-project-group{margin-bottom:14px;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.gantt-project-header{background:var(--paper);padding:8px 12px;font-size:12.5px;font-weight:700;color:var(--navy-text);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;}
.gantt-project-header:hover{background:var(--grey-light);}
.gantt-project-toggle{font-size:10px;width:12px;display:inline-block;}
.gantt-project-count{font-weight:400;color:var(--ink-mid);}
.gantt-project-body{background:var(--white);}
.gantt-scroll{overflow-x:auto;border-radius:var(--r);}
.gantt-daygrid th,.gantt-daygrid td{white-space:nowrap;}
.gantt-task-cell{white-space:normal!important;word-wrap:break-word;overflow-wrap:break-word;line-height:1.35;}
.gantt-daycell{width:24px;min-width:24px;max-width:24px;text-align:center;font-size:11px;font-weight:700;padding:4px 0!important;}
.gantt-today-col{box-shadow:inset 2px 0 0 #E03C31,inset -2px 0 0 #E03C31;}

/* ══ Gantt view (proportional bars, Wrike-style) ═══════════════ */
.gantt-tl-cell{padding:0!important;position:relative;height:36px;}
.gantt-tl-daycell{text-align:center;font-size:10px;font-weight:600;}
.gantt-prop-track{position:relative;height:100%;}
.gantt-prop-bar{position:absolute;top:6px;height:24px;border-radius:4px;font-size:10.5px;font-weight:700;color:#1B2630;display:flex;align-items:center;padding-left:8px;overflow:hidden;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.15);}
tr.gantt-overdue .gantt-prop-bar{color:#fff;}
.gantt-weekend-shade{position:absolute;top:0;bottom:0;background:rgba(13,27,42,.05);}
.gantt-tl-daycell.gantt-weekend-col{background:var(--paper);}
.gantt-timeline-table th{white-space:nowrap;}

/* ══ Split-pane layout (Sheet & Gantt views) ══════════════════
   Two independently-scrolling tables side by side instead of one table
   with sticky columns — the label columns (Category…Status) never scroll
   horizontally at all since they're a physically separate element; only
   the timeline pane scrolls, via click-and-drag instead of a scrollbar. */
.gantt-split-view{display:flex;align-items:flex-start;border:1px solid var(--grey-hair);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);background:var(--white);}
.gantt-split-left{flex-shrink:0;width:660px;max-width:70vw;overflow-x:auto;scrollbar-width:thin;}
.gantt-split-left::-webkit-scrollbar{height:7px;width:0;}
.gantt-split-left::-webkit-scrollbar:vertical{display:none;width:0;}
.gantt-split-left::-webkit-scrollbar-thumb{background:var(--grey-hair);border-radius:4px;}
.gantt-split-left-table{table-layout:fixed;width:100%;}
.gantt-split-left-table th:nth-child(1),.gantt-split-left-table td:nth-child(1){width:14%;}
.gantt-split-left-table th:nth-child(2),.gantt-split-left-table td:nth-child(2){width:17%;}
.gantt-split-left-table th:nth-child(3),.gantt-split-left-table td:nth-child(3){width:27%;}
.gantt-split-left-table th:nth-child(4),.gantt-split-left-table td:nth-child(4){width:11%;}
.gantt-split-left-table th:nth-child(5),.gantt-split-left-table td:nth-child(5){width:11%;}
.gantt-split-left-table th:nth-child(6),.gantt-split-left-table td:nth-child(6){width:14%;}
.gantt-split-left-table th:nth-child(7),.gantt-split-left-table td:nth-child(7){width:6%;}
.gantt-split-left table{width:100%;margin:0;box-shadow:none;border-radius:0;}
.gantt-split-left-table td,.gantt-split-left-table th{border-right:1px solid var(--grey-light);}
.gantt-splitter{width:6px;flex-shrink:0;background:var(--grey-light);cursor:col-resize;position:relative;align-self:stretch;}
.gantt-splitter:hover,.gantt-splitter.dragging{background:var(--navy-text-mid);}
.gantt-splitter::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:28px;background:var(--grey-hair);border-radius:1px;}
.gantt-split-right{flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;cursor:grab;scrollbar-width:none;-ms-overflow-style:none;}
.gantt-split-right::-webkit-scrollbar{display:none;}
.gantt-split-right.panning{cursor:grabbing;user-select:none;}
.gantt-split-right table{margin:0;box-shadow:none;border-radius:0;width:max-content;}
.gantt-split-right-table td,.gantt-split-right-table th{border-right:none;}

/* ══ Table view (flat, sortable, no timeline) ═══════════════ */
.gantt-table-list th.ttsort-th{cursor:pointer;user-select:none;}
.gantt-table-list th.ttsort-th:hover{background:var(--navy-text-mid);}
.workload-cell{text-align:center;vertical-align:middle;width:26px;min-width:26px;font-size:11px;font-weight:700;color:var(--ink);}
.workload-cell.workload-overloaded{box-shadow:inset 0 0 0 2px #C77700;}
.workload-name-cell{font-weight:700;font-size:12.5px;white-space:nowrap;padding-right:10px!important;cursor:pointer;}
.workload-task-row td{background:var(--paper);}
.workload-task-label{padding-left:26px!important;font-size:11px;color:var(--ink-mid);white-space:nowrap;}
.workload-overload-badge{font-size:10px;color:#C77700;font-weight:700;}
.workload-num-cell{text-align:center;vertical-align:middle;}
.chip-cat{background:var(--paper);color:var(--navy-text-mid);border-color:var(--grey-hair);}
.chip-done{background:var(--green-light);color:var(--green);border-color:rgba(62,122,92,.2);}
.chip-progress{background:var(--amber-light);color:var(--amber);border-color:rgba(199,127,26,.2);}
.chip-hold{background:var(--amber-light);color:var(--amber);border-color:rgba(199,127,26,.2);}
.chip-open{background:var(--red-light);color:var(--red);border-color:rgba(184,58,58,.2);}
.chip-cancelled{background:var(--paper);color:var(--ink-mid);border-color:var(--grey-hair);}
.chip-overdue{background:#FDECEA;color:var(--red);border-color:rgba(184,58,58,.3);font-weight:800;}

/* ── TABLE CELLS ── */
.req-no{font-family:var(--f-mono);font-weight:700;color:var(--navy-text-mid);font-size:12px;white-space:nowrap;}
.date-cell{white-space:nowrap;color:var(--ink-mid);font-size:12px;font-family:var(--f-mono);}
.description-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-icon{color:var(--navy-text-mid);text-decoration:none;font-size:15px;opacity:.6;}
.link-icon:hover{opacity:1;}

/* ── EDITABLE CELLS ── */
.editable-cell{cursor:pointer;}
.editable-cell:hover{background:#EEF2F6;outline:1px dashed var(--grey-blue);outline-offset:-2px;}
.editable-cell.col-hl:hover{background:#F2E6BE!important;}
.editable-cell input,.editable-cell select,.editable-cell textarea{width:100%;border:1.5px solid var(--navy-mid);border-radius:2px;padding:4px 6px;font-size:12px;font-family:var(--f-body);background:var(--white);outline:none;}

/* ── CHECKBOXES & DELETE ── */
.row-check{width:16px;height:16px;cursor:pointer;accent-color:var(--navy-text);}
.del-row-btn{background:none;border:none;color:var(--grey-hair);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:2px;transition:color .15s;}
.del-row-btn:hover{color:var(--red);background:var(--red-light);}
.expand-btn{background:none;border:none;color:var(--ink-mid);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:2px;}
.expand-btn:hover{color:var(--navy-text);background:var(--grey-light);}

/* ── STATE ROWS ── */
.state-row td{text-align:center;padding:48px 14px;color:var(--ink-mid);}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--grey-hair);border-top-color:var(--navy-text-mid);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-notice{display:flex;flex-direction:column;align-items:center;gap:6px;}
.empty-notice-icon{font-size:32px;margin-bottom:4px;}

/* ── PAGINATION ── */
.pagination-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 40px;background:var(--white);border-top:1px solid var(--grey-hair);font-size:12px;color:var(--ink-mid);}
.pagination-btns{display:flex;gap:4px;flex-wrap:wrap;}
.page-btn{padding:4px 10px;border:1.5px solid var(--grey-hair);border-radius:var(--r);background:var(--paper);cursor:pointer;font-size:12px;font-family:var(--f-body);color:var(--ink);}
.page-btn:hover:not(:disabled){background:var(--grey-light);}
.page-btn.active{background:var(--navy);color:#fff;border-color:var(--navy-text);}
.page-btn:disabled{opacity:.4;cursor:default;}

/* ── DASHBOARD ── */
.dash-wrap{padding:28px 40px;display:flex;flex-direction:column;gap:24px;}
.dash-kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.card-stat{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px 20px;border-top:3px solid var(--grey-hair);}
.card-stat.cs-red{border-top-color:var(--red);}
.card-stat.cs-amb{border-top-color:var(--amber);}
.card-stat.cs-grn{border-top-color:var(--green);}
.card-stat.cs-navy{border-top-color:var(--navy-text);}
.card-stat-label{font-family:var(--f-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);margin-bottom:6px;}
.card-stat-val{font-family:var(--f-display);font-size:28px;font-weight:800;color:var(--ink);}
.card-stat-sub{font-size:11px;color:var(--ink-mid);margin-top:3px;}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.dash-row.single{grid-template-columns:1fr;}
.dash-section{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;}
.dash-section-header{padding:14px 20px;border-bottom:1px solid var(--grey-hair);display:flex;align-items:center;justify-content:space-between;}
.dash-section-title{font-family:var(--f-display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink);}
.dash-section-body{padding:16px 20px;}
.dash-chart{width:100%;overflow:hidden;}
.dash-table{width:100%;border-collapse:collapse;font-size:12px;}
.dash-table th{padding:8px 12px;text-align:left;font-family:var(--f-display);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);border-bottom:2px solid var(--grey-hair);}
.dash-table td{padding:8px 12px;border-bottom:1px solid var(--grey-light);}
.dash-table tr:last-child td{border-bottom:none;}
.perf-bar-wrap{height:8px;background:var(--grey-light);border-radius:4px;overflow:hidden;min-width:80px;}
.perf-bar{height:100%;border-radius:4px;background:var(--green);}
.perf-bar.late{background:var(--red);}
.dash-empty{padding:32px;text-align:center;color:var(--ink-mid);font-size:12px;}
.dash-toolbar{padding:10px 40px;background:var(--white);border-bottom:1px solid var(--grey-hair);display:flex;align-items:center;gap:8px;}

/* ── MANAGE ── */
.manage-wrap{padding:24px 40px;display:flex;flex-direction:column;gap:0;max-width:800px;margin:0 auto;}
.manage-section-tabs{display:flex;gap:4px;border-bottom:1px solid var(--grey-hair);margin-bottom:0;}
.manage-section-tab{padding:10px 18px;font-family:var(--f-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-mid);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.manage-section-tab.active{color:var(--navy-text);border-bottom-color:var(--navy-text);}
.manage-panel{display:none;flex-direction:column;padding:20px 0;gap:16px;}
.manage-panel.active{display:flex;}
.manage-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px;}
.manage-add-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--grey-hair);}
.manage-add-row input{flex:1;padding:7px 10px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:13px;font-family:var(--f-body);background:var(--paper);color:var(--ink);outline:none;}
.manage-add-row input:focus{border-color:var(--navy-text-mid);}
.manage-add-row select{padding:7px 10px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:12.5px;font-family:var(--f-body);background:var(--paper);color:var(--ink);outline:none;}
.manage-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--paper);border:1px solid var(--grey-hair);border-radius:var(--r);}
.manage-row-main{flex:1;}
.manage-row-name{font-size:13px;font-weight:600;color:var(--ink);}
.manage-row-sub{font-size:11px;color:var(--ink-mid);font-family:var(--f-mono);}
.manage-row-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;opacity:.5;}
.manage-row-del:hover{opacity:1;}

/* ── SETTINGS ── */
.settings-group{background:var(--paper);border:1px solid var(--grey-hair);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;}
.settings-group-title{font-family:var(--f-display);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy-text-mid);margin-bottom:4px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--grey-hair);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:12px;font-weight:500;color:var(--ink);flex:1;line-height:1.4;}
.settings-label small{display:block;font-size:10px;color:var(--ink-mid);font-weight:400;}
.settings-control select,.settings-control input[type="text"],.settings-control input[type="date"],.settings-control input[type="email"]{padding:5px 8px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:12px;font-family:var(--f-body);background:var(--white);color:var(--ink);outline:none;min-width:140px;}
.settings-control input[type="checkbox"]{width:16px;height:16px;accent-color:var(--navy-text);cursor:pointer;}
.settings-date-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.settings-info{font-family:var(--f-mono);font-size:11px;color:var(--ink-mid);padding:6px 10px;background:var(--grey-light);border-radius:2px;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,38,48,.55);z-index:900;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r);width:100%;max-width:600px;box-shadow:var(--shadow-lg);overflow:hidden;animation:popIn .2s ease;max-height:90vh;display:flex;flex-direction:column;}
@keyframes popIn{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-header{background:var(--navy-deep);color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-header h2{font-family:var(--f-display);font-size:14px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;}
.modal-close:hover{color:#fff;}
.modal-body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;overflow-y:auto;}
.modal-body .full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-family:var(--f-display);font-size:10px;font-weight:700;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.06em;}
.form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:13px;font-family:var(--f-body);color:var(--ink);background:var(--paper);outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy-text-mid);background:var(--white);}
.form-group textarea{resize:vertical;min-height:70px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--grey-hair);display:flex;justify-content:flex-end;gap:10px;background:var(--paper);flex-shrink:0;}
.login-required-note{background:var(--amber-light);border:1px solid rgba(199,127,26,.3);border-radius:var(--r);padding:12px 16px;font-size:12px;color:var(--amber);display:none;margin-bottom:4px;font-weight:600;text-align:center;}
.login-required-note.show{display:block;}
.dup-warning{background:var(--amber-light);border:1.5px solid rgba(199,127,26,.4);border-radius:var(--r);padding:12px 16px;font-size:12px;color:var(--amber);display:none;margin-bottom:4px;}
.dup-warning.show{display:block;}

/* ── DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(26,38,48,.4);z-index:900;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--white);box-shadow:var(--shadow-lg);z-index:901;transition:right .3s ease;display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{right:0;}
.drawer-header{background:var(--navy-deep);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drawer-header h2{font-family:var(--f-display);font-size:13px;font-weight:700;text-transform:uppercase;}
.drawer-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.drawer-section-title{font-family:var(--f-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);padding-bottom:6px;border-bottom:1px solid var(--grey-hair);margin-bottom:8px;}
.drawer-field{display:flex;flex-direction:column;gap:4px;}
.drawer-field label{font-family:var(--f-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-mid);}
.drawer-field input,.drawer-field select,.drawer-field textarea{padding:8px 11px;border:1.5px solid var(--grey-hair);border-radius:var(--r);font-size:13px;font-family:var(--f-body);color:var(--ink);background:var(--paper);outline:none;}
.drawer-field input:focus,.drawer-field select:focus,.drawer-field textarea:focus{border-color:var(--navy-text-mid);background:var(--white);}
.drawer-field textarea{resize:vertical;min-height:80px;}
.drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.drawer-footer{padding:14px 24px;border-top:1px solid var(--grey-hair);display:flex;gap:10px;justify-content:flex-end;background:var(--paper);flex-shrink:0;}
.drawer-history-item{display:flex;gap:10px;padding:8px 12px;background:var(--paper);border-radius:var(--r);border:1px solid var(--grey-hair);}
.dhi-dot{width:8px;height:8px;border-radius:50%;background:var(--navy-mid);flex-shrink:0;margin-top:4px;}
.dhi-content{flex:1;}
.dhi-action{font-size:12px;font-weight:600;color:var(--ink);}
.dhi-meta{font-size:11px;font-family:var(--f-mono);color:var(--ink-mid);}

/* ── PASSWORD GATE ── */


/* ── SUBMISSION CONFIRM MODAL ── */
.confirm-modal-icon{font-size:48px;text-align:center;padding:8px 0;}
.confirm-modal-req{font-family:var(--f-mono);font-size:22px;font-weight:800;color:var(--navy-text);text-align:center;}
.confirm-modal-specialist{background:var(--green-light);border:1px solid rgba(62,122,92,.2);border-radius:var(--r);padding:14px 18px;text-align:center;}
.confirm-modal-specialist strong{display:block;font-family:var(--f-display);font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px;}
.confirm-modal-note{font-size:12px;color:var(--ink-mid);text-align:center;line-height:1.7;padding:0 8px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy-deep);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:950;transform:translateY(80px);opacity:0;transition:all .3s ease;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}

/* ── CONFIG BANNER ── */
.config-banner{background:var(--amber-light);border:1.5px dashed var(--amber);border-radius:var(--r);margin:18px 40px 0;padding:14px 20px;font-size:13px;color:#7a5800;display:none;}
.config-banner.show{display:block;}

/* ── FOOTER ── */
.footer{background:var(--navy-deep);padding:28px 56px;display:flex;align-items:center;justify-content:space-between;margin-top:32px;border-top:3px solid var(--navy);}
.footer-logo{height:30px;}
.footer-info{text-align:right;font-family:var(--f-mono);font-size:10px;color:rgba(195,205,212,.4);line-height:1.9;}
.footer-info strong{color:var(--grey-blue);display:block;margin-bottom:2px;}

/* ── MOBILE CARDS ── */
.cards-wrap{display:none;}
.request-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;border-left:3px solid var(--grey-hair);}
.request-card.pri-critical{border-left-color:var(--red);}
.request-card.pri-high{border-left-color:var(--amber);}
.request-card.pri-medium{border-left-color:var(--green);}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--grey-hair);}
.card-req-no{font-family:var(--f-mono);font-weight:700;font-size:12px;color:var(--navy-text-mid);}
.card-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.card-row{display:flex;align-items:flex-start;gap:8px;}
.card-label{font-family:var(--f-display);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mid);min-width:80px;padding-top:2px;}
.card-val{font-size:12px;color:var(--ink);flex:1;}
.card-footer{padding:8px 16px;border-top:1px solid var(--grey-hair);display:flex;gap:8px;justify-content:flex-end;}

/* ── PRINT STYLES ── */
@media print{
  #nav,.tab-bar,.toolbar,.bulk-bar,.pagination-bar,.footer,.drawer,.modal-overlay,
  .drawer-overlay,.toast,.profile-dropdown,.col-toggle-panel{display:none!important;}
  body{background:#fff!important;color:#000!important;font-size:11px;}
  .tab-panel{display:block!important;}
  .tab-panel:not(.print-target){display:none!important;}
  .dash-wrap,.table-wrap{padding:0!important;}
  table{box-shadow:none!important;font-size:10px;}
  .hero{padding:16px!important;background:#fff!important;color:#000!important;}
  .hero-title,.hero-kpi-label,.hero-kpi-val,.hero-kpi-sub{color:#000!important;}
  .chip{border:1px solid #ccc!important;background:#f5f5f5!important;color:#000!important;}
  .dash-section{box-shadow:none!important;border:1px solid #ddd!important;break-inside:avoid;}
  svg text{fill:#000!important;}
  .print-hide{display:none!important;}
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #nav,.tab-bar{padding:0 16px;}
  .tab-item{padding:10px 12px;font-size:9px;}
  .hero{padding:24px 16px 20px;}
  .hero-title{font-size:18px;}
  .hero-kpi{min-width:90px;padding:10px 12px;}
  .hero-kpi-val{font-size:20px;}
  .toolbar{padding:8px 16px;}
  .table-wrap{padding:12px 16px 0;display:none;}
  .cards-wrap{display:flex!important;flex-direction:column;gap:10px;padding:12px 16px 0;}
  .pagination-bar{padding:10px 16px;}
  .dash-wrap{padding:16px;}
  .dash-row{grid-template-columns:1fr;}
  .manage-wrap{padding:16px;}
  .footer{padding:20px 16px;flex-direction:column;gap:12px;text-align:center;}
  .footer-info{text-align:center;}
  .drawer{width:100%;right:-100%;}
}
@media(min-width:769px){.cards-wrap{display:none!important;}}
</style>
</head>
